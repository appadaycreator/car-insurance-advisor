    <script>
    const BTN_COLOR = '#2563EB';

    const QUESTIONS = [
      {
        text: 'あなたの年齢を教えてください。',
        options: ['18〜25歳（若年ドライバー）', '26〜35歳', '36〜50歳', '51歳以上'],
        key: 'age'
      },
      {
        text: '現在の等級（ノンフリート等級）はどのくらいですか？',
        options: ['1〜5等級（保険料が高い・事故歴あり）', '6〜10等級（標準的）', '11〜15等級（割引あり）', '16〜20等級（最大割引）'],
        key: 'grade'
      },
      {
        text: '年間の走行距離はどのくらいですか？',
        options: ['3,000km未満（ほとんど乗らない）', '3,000〜10,000km（週末のみ）', '10,000〜20,000km（通勤利用あり）', '20,000km超（毎日長距離）'],
        key: 'mileage'
      },
      {
        text: '運転する車の用途・種類は？',
        options: ['軽自動車・コンパクトカー（私用）', '普通車（私用・通勤）', 'SUV・ミニバン（家族利用）', '高級車・スポーツカー'],
        key: 'cartype'
      },
      {
        text: '保険で最も重視することは何ですか？',
        options: ['保険料を安く抑えたい', '手厚い補償（対人・対物無制限）', '車両保険（自分の車の修理費）', 'ロードサービスや特約の充実'],
        key: 'priority'
      }
    ];

    const scores = {};
    let currentQ = 0;

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('q-total').textContent = QUESTIONS.length;
    });

    function startQuiz() {
      currentQ = 0; Object.keys(scores).forEach(k => delete scores[k]);
      document.getElementById('quiz-start').style.display = 'none';
      document.getElementById('quiz-area').style.display = 'block';
      document.getElementById('result').classList.remove('show');
      renderQuestion();
    }

    function renderQuestion() {
      const q = QUESTIONS[currentQ];
      document.getElementById('q-num').textContent = currentQ + 1;
      document.getElementById('q-bar').style.width = ((currentQ + 1) / QUESTIONS.length * 100) + '%';
      document.getElementById('q-text').textContent = q.text;
      document.getElementById('q-options').innerHTML = q.options.map((opt, i) =>
        `<button class="btn-opt" onclick="answer(${i})">${opt}</button>`
      ).join('');
    }

    function answer(idx) {
      scores[QUESTIONS[currentQ].key] = (scores[QUESTIONS[currentQ].key] || 0) + idx;
      currentQ++;
      if (currentQ >= QUESTIONS.length) { showResult(); return; }
      renderQuestion();
    }

    function showResult() {
      document.getElementById('quiz-area').style.display = 'none';

      // 判定ロジック
      const age      = scores['age']      || 0;  // 0=若 3=高齢
      const grade    = scores['grade']    || 0;  // 0=低 3=高
      const mileage  = scores['mileage']  || 0;  // 0=少 3=多
      const cartype  = scores['cartype']  || 0;  // 0=軽 3=高級
      const priority = scores['priority'] || 0;  // 0=安 3=充実

      // 総合リスクスコア
      const riskScore = age + (3 - grade) + mileage + cartype;

      let title, desc, badge, advice;

      if (riskScore <= 3) {
        title = '✅ ライト型（シンプルプラン）がおすすめ';
        badge = '保険料重視タイプ';
        desc  = '走行距離が少なく等級も高いため、保険料を抑えられるシンプルなプランが最適です。対人・対物無制限は必須ですが、車両保険は免責設定で節約できます。';
        advice = [
          '対人・対物は無制限を選択（必須）',
          '車両保険は免責5〜10万円で保険料を抑える',
          '走行距離連動型（テレマティクス）保険も検討',
          'ネット型保険で代理店費用を節約'
        ];
      } else if (riskScore <= 6) {
        title = '🛡️ スタンダード型（バランスプラン）がおすすめ';
        badge = 'バランス重視タイプ';
        desc  = '標準的なリスクプロファイルです。対人・対物無制限に加え、弁護士費用特約や人身傷害補償を付けたバランス型プランがおすすめです。';
        advice = [
          '対人・対物・人身傷害は必ず付ける',
          '弁護士費用特約（年間約1,500円）は必須レベル',
          '車両保険はオールリスク型を検討',
          '等級が上がるまでは少し広めの補償を'
        ];
      } else if (riskScore <= 9) {
        title = '🔰 ワイド型（手厚いプラン）がおすすめ';
        badge = '補償充実タイプ';
        desc  = '走行距離が多く、車両価値も高めです。万が一の際の費用負担を最小化するため、車両保険込みの手厚いプランをお勧めします。';
        advice = [
          '車両保険はオールリスク型（免責0〜3万円）',
          '人身傷害は無制限で設定',
          'ロードサービスの充実した会社を選ぶ',
          '家族限定割引・複数台割引も活用'
        ];
      } else {
        title = '💎 プレミアム型（最上位プラン）がおすすめ';
        badge = '万全補償タイプ';
        desc  = '高額車・高リスクなドライビングスタイルのため、プレミアムなフルカバー保険が安心です。車両保険・特約も最大限に活用しましょう。';
        advice = [
          'フルカバー車両保険（新価特約付き）を強く推奨',
          '代車費用・レンタカー特約を付ける',
          '弁護士特約・ファミリーバイク特約も検討',
          '複数社で見積もりを取り比較する'
        ];
      }

      // 保険料目安
      const baseFee = [8, 6, 4, 3][Math.min(3, grade)]; // 等級別基準（万円/年）
      const ageMult = [1.6, 1.2, 1.0, 0.95][Math.min(3, age)];
      const milageMult = [0.85, 1.0, 1.1, 1.2][Math.min(3, mileage)];
      const low  = Math.round(baseFee * ageMult * milageMult * 10) * 1000;
      const high = Math.round(low * 1.5 / 1000) * 1000;

      const adviceHTML = advice.map(a =>
        `<div class="advice-item"><span class="advice-icon">✔</span><span>${a}</span></div>`
      ).join('');

      document.getElementById('r-title').textContent = title;
      document.getElementById('r-desc').innerHTML = `
        <span class="result-badge">${badge}</span>
        <p style="margin-bottom:12px;">${desc}</p>
        <div style="background:#EFF6FF;border-radius:10px;padding:12px;margin-bottom:12px;">
          <div style="font-size:12px;font-weight:700;color:#1D4ED8;margin-bottom:4px;">💰 保険料の目安（年額）</div>
          <div style="font-size:1.4rem;font-weight:800;color:#2563EB;">約 ${low.toLocaleString()}円 〜 ${high.toLocaleString()}円</div>
          <div style="font-size:11px;color:#64748B;margin-top:4px;">※等級・車種・補償内容により大きく異なります</div>
        </div>
        <div style="font-size:13px;font-weight:700;color:#374151;margin-bottom:8px;">💡 アドバイス</div>
        ${adviceHTML}
      `;
      document.getElementById('result').classList.add('show');
    }
    </script>
